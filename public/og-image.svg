<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="200" fill="#F59E0B" opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#F59E0B" opacity="0.05"/>
  
  <!-- Gold accent line top -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#goldGrad)"/>
  
  <!-- Main content area -->
  <text x="600" y="200" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" font-style="italic">
    Charmant Nyungu K.
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="32" fill="#94A3B8" text-anchor="middle">
    Consultant en Innovation Technologique
  </text>
  
  <!-- Separator line -->
  <rect x="400" y="320" width="400" height="3" rx="1.5" fill="url(#goldGrad)"/>
  
  <!-- Keywords -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="28" fill="#CBD5E1" text-anchor="middle">
    Transformation Digitale • Panafricanisme • Data Science
  </text>
  
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="28" fill="#CBD5E1" text-anchor="middle">
    Cybersécurité • Intelligence Artificielle
  </text>
  
  <!-- Website URL -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="36" fill="url(#goldGrad)" text-anchor="middle" font-weight="bold">
    charmantnyungu.com
  </text>
  
  <!-- Gold accent line bottom -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#goldGrad)"/>
</svg>
