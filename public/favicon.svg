<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#dark)"/>
  
  <!-- Gold Border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gold)" stroke-width="16"/>
  
  <!-- CNK Letters -->
  <text x="256" y="300" font-family="Georgia, serif" font-size="180" font-weight="bold" fill="url(#gold)" text-anchor="middle" font-style="italic">
    CNK
  </text>
  
  <!-- Decorative line under text -->
  <rect x="100" y="340" width="312" height="8" rx="4" fill="url(#gold)"/>
</svg>
