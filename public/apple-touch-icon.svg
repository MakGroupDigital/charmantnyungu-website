<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#dark)"/>
  
  <!-- CNK Letters -->
  <text x="90" y="115" font-family="Georgia, serif" font-size="70" font-weight="bold" fill="url(#gold)" text-anchor="middle" font-style="italic">
    CNK
  </text>
  
  <!-- Decorative line -->
  <rect x="30" y="130" width="120" height="4" rx="2" fill="url(#gold)"/>
</svg>
